name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.5)'
        required: true
        type: string

permissions:
  contents: write

env:
  SCHEME: rytmo
  APP_NAME: Rytmo

jobs:
  release:
    name: Build & Release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create Config.xcconfig
        run: |
          cat > Config.xcconfig << 'EOF'
          AMPLITUDE_API_KEY = ${{ secrets.AMPLITUDE_API_KEY }}
          YOUTUBE_DATA_API_KEY = ${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_CLIENT_ID = ${{ secrets.GID_CLIENT_ID }}
          REVERSED_CLIENT_ID = ${{ secrets.GOOGLE_REVERSED_CLIENT_ID }}
          SUPublicEDKey = EYMWsXNcoLTDXTtpvk5QOD46UTUE7PUEb/XizGLaLbE=
          SPARKLE_FEED_URL = https://qyinm.github.io/rytmo/sparkle/appcast.xml
          EOF

      - name: Import Code Signing Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Allow codesign to access keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Build Release Archive
        run: |
          mkdir -p build

          xcodebuild archive \
            -project rytmo.xcodeproj \
            -scheme "$SCHEME" \
            -archivePath build/rytmo.xcarchive \
            -configuration Release \
            -destination "generic/platform=macOS" \
            CODE_SIGN_IDENTITY="Developer ID Application"

      - name: Export Archive
        run: |
          xcodebuild -exportArchive \
            -archivePath build/rytmo.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Notarize App
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="build/export/$APP_NAME.app"
          ZIP_PATH="build/$APP_NAME-notarize.zip"

          # Create zip for notarization
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

          # Submit and wait
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --timeout 30m

          # Staple
          xcrun stapler staple "$APP_PATH"

          # Verify
          spctl -a -vvv -t execute "$APP_PATH"

          # Cleanup
          rm -f "$ZIP_PATH"

      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_PATH="build/export/$APP_NAME.app"
          DMG_PATH="build/$APP_NAME-${VERSION}.dmg"

          # Install create-dmg if available
          brew install create-dmg || true

          if command -v create-dmg &> /dev/null; then
            create-dmg \
              --volname "$APP_NAME" \
              --window-pos 200 120 \
              --window-size 600 400 \
              --icon-size 100 \
              --icon "$APP_NAME.app" 150 190 \
              --hide-extension "$APP_NAME.app" \
              --app-drop-link 450 185 \
              --no-internet-enable \
              "$DMG_PATH" \
              "$APP_PATH" || {
                # Fallback to hdiutil
                DMG_TEMP="build/dmg-temp"
                mkdir -p "$DMG_TEMP"
                cp -R "$APP_PATH" "$DMG_TEMP/"
                ln -s /Applications "$DMG_TEMP/Applications"
                hdiutil create -volname "$APP_NAME" -srcfolder "$DMG_TEMP" -ov -format UDZO "$DMG_PATH"
                rm -rf "$DMG_TEMP"
              }
          else
            # Fallback to hdiutil
            DMG_TEMP="build/dmg-temp"
            mkdir -p "$DMG_TEMP"
            cp -R "$APP_PATH" "$DMG_TEMP/"
            ln -s /Applications "$DMG_TEMP/Applications"
            hdiutil create -volname "$APP_NAME" -srcfolder "$DMG_TEMP" -ov -format UDZO "$DMG_PATH"
            rm -rf "$DMG_TEMP"
          fi

          echo "dmg_path=$DMG_PATH" >> $GITHUB_ENV

      - name: Create ZIP
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_PATH="build/export/$APP_NAME.app"
          ZIP_PATH="build/$APP_NAME-${VERSION}.zip"

          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

          echo "zip_path=$ZIP_PATH" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Rytmo v${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            build/${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.dmg
            build/${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Sparkle Appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          VERSION="${{ steps.version.outputs.version }}"
          DMG_PATH="build/$APP_NAME-${VERSION}.dmg"
          DMG_NAME="$APP_NAME-${VERSION}.dmg"
          APPCAST_FILE="sparkle/appcast.xml"
          RELEASE_NOTES_URL="https://github.com/${{ github.repository }}/releases/tag/v${VERSION}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/${DMG_NAME}"

          if [ ! -f "$DMG_PATH" ]; then
            echo "::error::Missing DMG at $DMG_PATH"
            exit 1
          fi

          if [ -z "${SPARKLE_PRIVATE_KEY:-}" ]; then
            echo "::error::SPARKLE_PRIVATE_KEY secret is required for Sparkle updates."
            exit 1
          fi

          SIGN_UPDATE=""
          for candidate in \
            "$HOME/Library/Developer/Xcode/DerivedData"/*/SourcePackages/artifacts/sparkle/Sparkle/bin/sign_update \
            /usr/local/bin/sign_update \
            ./sign_update
          do
            if [ -f "$candidate" ] && [ -x "$candidate" ]; then
              SIGN_UPDATE="$candidate"
              break
            fi
          done

          if [ -z "$SIGN_UPDATE" ]; then
            echo "::error::sign_update tool not found. Cannot create sparkle:edSignature."
            exit 1
          fi

          BUILD=$(grep -m1 "CURRENT_PROJECT_VERSION" "rytmo.xcodeproj/project.pbxproj" | sed 's/.*= \(.*\);/\1/')
          DMG_SIZE=$(stat -f%z "$DMG_PATH")
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")
          SIGNATURE=$(echo "$SPARKLE_PRIVATE_KEY" | base64 -d | "$SIGN_UPDATE" --ed-key-file - "$DMG_PATH" 2>/dev/null || true)

          if [ -z "$SIGNATURE" ]; then
            echo "::error::Failed to generate Sparkle EdDSA signature."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$DEFAULT_BRANCH"
          git checkout -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"

          mkdir -p sparkle
          if [ ! -f "$APPCAST_FILE" ]; then
            printf '%s\n' \
              '<?xml version="1.0" standalone="yes"?>' \
              '<rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" version="2.0">' \
              '    <channel>' \
              '        <title>Rytmo</title>' \
              '    </channel>' \
              '</rss>' > "$APPCAST_FILE"
          fi

          ITEM_FILE="$(mktemp)"
          cat > "$ITEM_FILE" << EOF
                  <item>
                      <title>${VERSION}</title>
                      <pubDate>${PUB_DATE}</pubDate>
                      <sparkle:version>${BUILD}</sparkle:version>
                      <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                      <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
                      <sparkle:releaseNotesLink>${RELEASE_NOTES_URL}</sparkle:releaseNotesLink>
                      <enclosure url="${DOWNLOAD_URL}" length="${DMG_SIZE}" type="application/octet-stream" sparkle:edSignature="${SIGNATURE}"/>
                  </item>
          EOF

          TMP_APPCAST="$(mktemp)"
          awk '
            NR==FNR { item = item $0 ORS; next }
            {
              print
              if (!inserted && $0 ~ /<channel>/) {
                printf "%s", item
                inserted=1
              }
            }
          ' "$ITEM_FILE" "$APPCAST_FILE" > "$TMP_APPCAST"
          mv "$TMP_APPCAST" "$APPCAST_FILE"
          rm -f "$ITEM_FILE"

          git add "$APPCAST_FILE"
          if git diff --cached --quiet; then
            echo "No appcast changes detected."
            exit 0
          fi

          git commit -m "chore: update sparkle appcast for v${VERSION}"
          git push origin "$DEFAULT_BRANCH"

      - name: Cleanup Keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
