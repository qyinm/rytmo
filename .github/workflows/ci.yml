name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          for candidate in \
            /Applications/Xcode_16.4.app \
            /Applications/Xcode_16.3.app \
            /Applications/Xcode_16.2.app \
            /Applications/Xcode_16.1.app \
            /Applications/Xcode_16.0.app \
            /Applications/Xcode.app \
            /Applications/Xcode_15.4.app
          do
            if [ -d "$candidate" ]; then
              sudo xcode-select -s "$candidate"
              break
            fi
          done

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Create Config.xcconfig
        run: |
          cat > Config.xcconfig << 'EOF'
          AMPLITUDE_API_KEY = test-key
          YOUTUBE_DATA_API_KEY = test-key
          GOOGLE_CLIENT_ID = test-client-id
          REVERSED_CLIENT_ID = com.googleusercontent.apps.test
          SUPublicEDKey = test-public-key
          SPARKLE_FEED_URL = https://example.github.io/rytmo/sparkle/appcast.xml
          EOF

      - name: Build
        run: |
          xcodebuild -project rytmo.xcodeproj \
            -scheme rytmo \
            -configuration Debug \
            -destination "platform=macOS" \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run Tests
        run: |
          if xcodebuild -project rytmo.xcodeproj -scheme rytmo -showTestPlans >/dev/null 2>&1; then
            xcodebuild -project rytmo.xcodeproj \
              -scheme rytmo \
              -configuration Debug \
              -destination "platform=macOS" \
              -derivedDataPath ./DerivedData \
              CODE_SIGNING_ALLOWED=NO \
              test
          else
            echo "::notice::Scheme 'rytmo' has no test action configured. Skipping tests."
          fi

  lint:
    name: Swift Lint
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint || true

      - name: Run SwiftLint
        run: |
          cd rytmo
          swiftlint lint --reporter github-actions-logging || echo "SwiftLint not configured, skipping"
